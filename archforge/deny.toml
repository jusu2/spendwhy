# cargo-deny configuration for ArchForge.
# Run: cargo install cargo-deny && cargo deny --manifest-path Cargo.toml check

[graph]
all-features = false
no-default-features = false

[advisories]
yanked = "deny"
ignore = []

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

# === Architectural bans (the "physics constants") ===
# These enforce ArchForge's dependency direction invariant.
#
# Rule 1: contract-* crates must NEVER depend on infra-* or app-* or domain-*.
# Rule 2: domain-* crates must NEVER depend on infra-* or app-*.
# Rule 3: infra-* crates must NEVER depend on each other or on domain-*/app-*.
# Rule 4: kernel must depend on nothing internal.
#
# cargo-deny lacks per-crate dependency restrictions natively, so the harder
# checks live in scripts/check-invariants.ps1 (Step 4 deliverable). The bans
# below catch the easy cases.

[[bans.deny]]
name = "openssl"
# We default to rustls everywhere to avoid system OpenSSL linkage on Windows.

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
